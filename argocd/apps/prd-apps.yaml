apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prd-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/wedigitek/wedigitek-k8s-gitops.git
    targetRevision: main
    path: argocd/apps/prd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
