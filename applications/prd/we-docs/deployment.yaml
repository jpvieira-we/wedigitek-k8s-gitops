apiVersion: apps/v1
kind: Deployment
metadata:
  name: we-docs
  namespace: wedigitek-prd
  labels:
    app: we-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: we-docs
  template:
    metadata:
      labels:
        app: we-docs
    spec:
      containers:
      - name: we-docs
        image: registry.gitlab.com/wedigitek1/we-docs:master
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: we-docs-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
