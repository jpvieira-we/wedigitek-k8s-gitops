apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: we-wallet-prd

resources:
  - secretproviderclass-env.yaml
  - namespace.yaml
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      environment: production
      managed-by: argocd

images:
  - name: acrwedigitekprd.azurecr.io/we-wallet
    newName: ghcr.io/wedigitek/we-wallet
    newTag: main
