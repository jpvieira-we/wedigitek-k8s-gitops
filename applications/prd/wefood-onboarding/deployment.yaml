apiVersion: apps/v1
kind: Deployment
metadata:
  name: wefood-onboarding
  namespace: wefood-onboarding-prd
  labels:
    app: wefood-onboarding
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wefood-onboarding
  template:
    metadata:
      labels:
        app: wefood-onboarding
    spec:
      containers:
      - name: wefood-onboarding
        image: acrwedigitekprd.azurecr.io/wefood-onboarding:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
