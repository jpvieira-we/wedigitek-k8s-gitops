apiVersion: apps/v1
kind: Deployment
metadata:
  name: we-api
  namespace: we-api-prd
  labels:
    app: we-api
    version: v3.22.4
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: we-api
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "3000"
        prometheus.io/scrape: "true"
      labels:
        app: we-api
        version: v3.22.4
    spec:
      volumes:
      - name: keyvault-env
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: we-api-keyvault-env
      - name: keyvault-files
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: we-api-keyvault-files
      containers:
      - name: we-api
        image: acrwedigitekprd.azurecr.io/we-api:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: we-api-config
        - secretRef:
            name: we-api-secrets
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        volumeMounts:
        - name: keyvault-env
          mountPath: /mnt/keyvault-env
          readOnly: true
        - name: keyvault-files
          mountPath: /we-api/certs
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - sleep 15
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          timeoutSeconds: 3
          periodSeconds: 5
