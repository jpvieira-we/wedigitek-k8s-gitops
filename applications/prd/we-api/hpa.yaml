apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: we-api
  namespace: we-api-prd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: we-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Espera 5min antes de reduzir
      policies:
      - type: Percent
        value: 50  # Reduz no máximo 50% dos pods por vez
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up imediato
      policies:
      - type: Percent
        value: 100  # Pode dobrar número de pods
        periodSeconds: 15
      - type: Pods
        value: 2  # Ou adicionar 2 pods
        periodSeconds: 15
      selectPolicy: Max  # Usa a política mais agressiva
