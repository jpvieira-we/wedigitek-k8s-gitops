apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: we-api
  namespace: we-api-prd
  annotations:
    # NGINX Ingress
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    
    # SSL/TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    
    # Body size
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    
    # CORS (se necessário)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
spec:
  tls:
  - hosts:
    - api.wefood.com  # ATUALIZAR com domínio real
    - api-new.wefood.com  # Domínio temporário para testes paralelos
    secretName: we-api-tls
  
  rules:
  # Produção (após cutover)
  - host: api.wefood.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: we-api
            port:
              number: 80
  
  # Temporário para testes (ambiente paralelo)
  - host: api-new.wefood.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: we-api
            port:
              number: 80
