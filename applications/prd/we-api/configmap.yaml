apiVersion: v1
kind: ConfigMap
metadata:
  name: we-api-config
  namespace: we-api-prd
data:
  NODE_ENV: "production"
  NODE_PATH: "."
  WE_API_PORT: "3000"
  
  # MongoDB - Ambiente de TESTE (não conectado à produção ainda)
  # TODO: Configurar MongoDB Atlas ou conexão com prod após validação
  MONGODB_URI: "mongodb://localhost:27017/wefood-test"
  
  # Redis - Desabilitado por enquanto
  REDIS_HOST: "localhost"
  REDIS_PORT: "6379"
  REDIS_ENABLED: "false"
  
  # Logs
  WE_API_LOGGER_ENABLED: "true"
  LOG_LEVEL: "info"
  
  # NOTA: Secrets sensíveis devem estar em Secret (não ConfigMap)
  # Criar sealed-secret.yaml separadamente com:
  # - JWT_SECRET
  # - DATABASE_PASSWORD
  # - API_KEYS
  # - PAYMENT_GATEWAY_KEYS
