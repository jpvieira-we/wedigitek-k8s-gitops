apiVersion: v1
kind: ConfigMap
metadata:
  name: we-api-config
  namespace: we-api-prd
data:
  NODE_ENV: "production"
  NODE_PATH: "."
  WE_API_PORT: "3000"
  
  # MongoDB - ATUALIZAR com MongoDB Atlas após migração
  # Por enquanto, apontar para cluster MongoDB atual
  MONGODB_URI: "mongodb://mongo-cluster-001.internal:27017,mongo-cluster-002.internal:27017/wefood?replicaSet=rs0"
  
  # Redis
  REDIS_HOST: "redis-master.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Logs
  WE_API_LOGGER_ENABLED: "true"
  LOG_LEVEL: "info"
  
  # NOTA: Secrets sensíveis devem estar em Secret (não ConfigMap)
  # Criar sealed-secret.yaml separadamente com:
  # - JWT_SECRET
  # - DATABASE_PASSWORD
  # - API_KEYS
  # - PAYMENT_GATEWAY_KEYS
