apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-control-webserver
  namespace: wedigitek-prd
  labels:
    app: quality-control-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quality-control-webserver
  template:
    metadata:
      labels:
        app: quality-control-webserver
    spec:
      containers:
      - name: quality-control-webserver
        image: registry.gitlab.com/wedigitek1/quality-control-webserver:master
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: quality-control-webserver-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
