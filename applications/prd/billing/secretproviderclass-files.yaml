apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: billing-keyvault-files
  namespace: billing-prd
spec:
  provider: azure
  secretObjects:
  - secretName: billing-files-kv
    type: Opaque
    data:
    - objectName: at-certificate.pfx
      key: at-certificate.pfx
  parameters:
    usePodIdentity: 'false'
    useVMManagedIdentity: 'true'
    userAssignedIdentityID: ecc658e3-b1ba-46b7-8f7c-b5cf75272df2
    keyvaultName: kv-wedigitek-prd
    cloudName: ''
    objects: "array:\n  - |\n    objectName: billing-at-certificate-pfx\n    objectType:\
      \ secret\n    objectAlias: at-certificate.pfx\n"
    tenantId: 9fabb809-1920-4f77-8694-f9af659b5d21
