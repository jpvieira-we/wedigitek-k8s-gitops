apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-control
  namespace: quality-control-prd
  labels:
    app: quality-control
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: quality-control
  template:
    metadata:
      labels:
        app: quality-control
    spec:
      containers:
      - name: quality-control
        image: acrwedigitekprd.azurecr.io/quality-control:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
