apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 7.7.12  # Versão estável do Helm chart
    helm:
      valuesObject:
        global:
          domain: argocd.wedigitek.com
        
        configs:
          params:
            server.insecure: true  # Para usar sem TLS interno (Ingress fará TLS)
            server.repo.server.timeout.seconds: "120"
          
          cm:
            url: https://argocd.wedigitek.com
            
            # Repositórios GitOps
            repositories: |
              - url: https://github.com/wedigitek/wedigitek-k8s-gitops.git
                name: wedigitek-gitops
                type: git
            
            # Resource customizations para health checks
            resource.customizations: |
              argoproj.io/Application:
                health.lua: |
                  hs = {}
                  hs.status = "Progressing"
                  hs.message = ""
                  if obj.status ~= nil then
                    if obj.status.health ~= nil then
                      hs.status = obj.status.health.status
                      if obj.status.health.message ~= nil then
                        hs.message = obj.status.health.message
                      end
                    end
                  end
                  return hs
          
          rbac:
            policy.default: role:readonly
            policy.csv: |
              # Admin role
              p, role:admin, applications, *, */*, allow
              p, role:admin, clusters, *, *, allow
              p, role:admin, repositories, *, *, allow
              p, role:admin, projects, *, *, allow
              p, role:admin, accounts, *, *, allow
              p, role:admin, certificates, *, *, allow
              p, role:admin, gpgkeys, *, *, allow
              
              # Developer role  
              p, role:developer, applications, get, */*, allow
              p, role:developer, applications, sync, */*, allow
              p, role:developer, repositories, get, *, allow
              p, role:developer, projects, get, *, allow
              
              # Grant admin to admin group
              g, admin, role:admin
        
        server:
          replicas: 2
          
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
              nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
            hosts:
              - argocd.wedigitek.com
            tls:
              - secretName: argocd-tls
                hosts:
                  - argocd.wedigitek.com
        
        repoServer:
          replicas: 2
          
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        
        applicationSet:
          enabled: true
          replicas: 2
        
        notifications:
          enabled: true
          
          argocdUrl: https://argocd.wedigitek.com
          
          # Slack notifications (configurar depois)
          # notifiers:
          #   service.slack: |
          #     token: $slack-token
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
